<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selfie Live Camera Premium</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 18px;
      text-align: center;
    }

    .camera-wrapper {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 3 / 4;
      border-radius: 28px;
      overflow: hidden;
      background: #1e293b;
      box-shadow: 0 0 0 2px rgba(20,184,166,0.4), 0 0 35px rgba(20,184,166,0.25);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    .premium-frame {
      position: absolute;
      inset: 18px;
      border: 3px solid #14b8a6;
      border-radius: 24px;
      box-shadow: inset 0 0 20px rgba(20,184,166,0.25), 0 0 18px rgba(20,184,166,0.35);
      pointer-events: none;
    }

    .corner {
      position: absolute;
      width: 34px;
      height: 34px;
      border: 4px solid #5eead4;
      pointer-events: none;
    }

    .tl { top: 28px; left: 28px; border-right: 0; border-bottom: 0; border-radius: 12px 0 0 0; }
    .tr { top: 28px; right: 28px; border-left: 0; border-bottom: 0; border-radius: 0 12px 0 0; }
    .bl { bottom: 28px; left: 28px; border-right: 0; border-top: 0; border-radius: 0 0 0 12px; }
    .br { bottom: 28px; right: 28px; border-left: 0; border-top: 0; border-radius: 0 0 12px 0; }

    .camera-text {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 48px);
      text-align: center;
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(94, 234, 212, 0.45);
      color: #ccfbf1;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      backdrop-filter: blur(6px);
    }

    .controls {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      border: none;
      padding: 12px 18px;
      border-radius: 14px;
      background: linear-gradient(135deg, #14b8a6, #0ea5e9);
      color: white;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(20,184,166,0.25);
    }

    footer {
      margin-top: 22px;
      color: #94a3b8;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>📷 Selfie Live Camera</h1>
  <div class="subtitle">Kamera portrait premium bikinan IXIA</div>

  <div class="camera-wrapper">
    <video id="video" autoplay playsinline muted></video>
    <div class="premium-frame"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="camera-text" id="cameraText">
      ✨ Kamera aktif — posisikan wajah di dalam frame premium
    </div>
  </div>

  <canvas id="photoCanvas" style="display:none"></canvas>
  <img id="photoPreview" style="display:none; margin-top:18px; max-width:420px; width:100%; border-radius:20px; border:2px solid rgba(94,234,212,0.5); box-shadow:0 0 24px rgba(20,184,166,0.2);" />

  <div class="controls">
    <button onclick="capturePhoto()">📸 Ambil Foto</button>
    <button onclick="switchCamera()">🔄 Switch Kamera</button>
  </div>

  <footer>Crafting Selfi Live Camera by IXIA</footer>

  <script>
    const video = document.getElementById('video');
    let currentFacingMode = 'user';
    let currentStream = null;

    async function startCamera() {
      try {
        if (currentStream) {
          currentStream.getTracks().forEach(track => track.stop());
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: currentFacingMode,
            width: { ideal: 720 },
            height: { ideal: 960 }
          },
          audio: false
        });

        currentStream = stream;
        video.srcObject = stream;

        document.getElementById('cameraText').textContent =
          currentFacingMode === 'user'
            ? '✨ Kamera depan aktif — silakan selfie dengan pose terbaik'
            : '📷 Kamera belakang aktif — arahkan objek ke frame';
      } catch (error) {
        document.getElementById('cameraText').textContent =
          '❌ Kamera gagal diakses: ' + error.message;
      }
    }

    function capturePhoto() {
      const canvas = document.getElementById('photoCanvas');
      const preview = document.getElementById('photoPreview');
      const context = canvas.getContext('2d');

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      if (currentFacingMode === 'user') {
        context.translate(canvas.width, 0);
        context.scale(-1, 1);
      }

      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      preview.src = canvas.toDataURL('image/jpeg', 0.9);
      preview.style.display = 'block';

      document.getElementById('cameraText').textContent = '✅ Foto berhasil diambil, silakan lanjut submit buku tamu';
    }

    function switchCamera() {
      currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
      startCamera();
    }

    startCamera();
  </script>
</body>
</html>
